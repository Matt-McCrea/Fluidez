<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Fluidez — Spanish, every day</title>

  <!-- PWA / installable -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0e7c86">

  <!-- iOS home-screen app (iOS ignores the manifest icons/display mode) -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fluidez">

  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">🌊 <span>Fluidez</span> <span class="tagline">Spanish, every day</span></div>
    <div class="session-progress"><div id="session-progress-fill"></div></div>
    <button id="theme-toggle" class="icon-btn" title="Toggle theme">🌙</button>
  </header>

  <main class="app-main">
    <div id="tab-host"></div>
    <div id="stage-host" class="hidden"></div>
  </main>

  <!-- data -->
  <script src="data/verbs.js"></script>
  <script src="data/vocab.js"></script>
  <script src="data/idioms.js"></script>
  <script src="data/grammar-docs.js"></script>
  <script src="data/grammar.js"></script>
  <script src="data/passages.js"></script>
  <script src="data/apply.js"></script>
  <script src="data/writing.js"></script>
  <script src="data/topics.js"></script>
  <script src="data/resources.js"></script>
  <!-- engine + core (stores must precede the stages/views that read them) -->
  <script src="js/engine.js"></script>
  <script src="js/lessons.js"></script>
  <script src="js/checker.js"></script>
  <script src="js/srs.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/curriculum.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/errorlog.js"></script>
  <script src="js/capture.js"></script>
  <script src="js/deck.js"></script>
  <!-- session stages -->
  <script src="js/views/review.js"></script>
  <script src="js/views/learn.js"></script>
  <script src="js/views/comprehend.js"></script>
  <script src="js/views/apply.js"></script>
  <script src="js/views/produce.js"></script>
  <!-- hub views -->
  <script src="js/hub.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/resources.js"></script>
  <script src="js/write.js"></script>
  <script src="js/writer.js"></script>
  <script src="js/grammar.js"></script>
  <script src="js/practice.js"></script>
  <script src="js/lessonrun.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/games.js"></script>
  <!-- orchestrator + router (last) -->
  <script src="js/session.js"></script>
  <script src="js/shell.js"></script>
  <script src="js/app.js"></script>
  <!-- PWA install/update (independent of the app's own view stack) -->
  <script src="js/pwa.js"></script>
</body>
</html>
